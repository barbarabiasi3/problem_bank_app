# fly.toml app configuration file generated for econ-problem-bank on 2026-06-24T18:09:21Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "econ-problem-bank"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PROBLEM_BANK_DATA_DIR = "/app/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
