<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Problem Bank | Basics of Economics{% endblock %}</title>
    <link rel="icon" href="/static/img/yale-y-favicon.svg?v=20260624" type="image/svg+xml">
    <link rel="stylesheet" href="/static/styles.css?v=20260625-copyright">
  </head>
  <body>
    <header class="site-header">
      <a class="wordmark" href="/">
        {% set logo_path = brand_logo_path() %}
        {% if logo_path %}
          <img class="brand-logo" src="{{ logo_path }}" alt="Yale School of Management">
        {% endif %}
        <span class="school-name"><span>Yale</span> School of Management</span>
      </a>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      <p>© 2026 Barbara Biasi. All rights reserved. Redistribution, public posting, or commercial use is prohibited without written permission.</p>
    </footer>
  </body>
</html>
