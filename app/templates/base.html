<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}MGT 404 Problem Bank{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}?v=20260624-difficulty-bank">
  </head>
  <body>
    <header class="site-header">
      <a class="wordmark" href="/">
        {% set logo_path = brand_logo_path() %}
        {% if logo_path %}
          <img class="brand-logo" src="{{ logo_path }}" alt="Yale School of Management">
        {% endif %}
        <span class="school-name"><span>Yale</span> School of Management</span>
      </a>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="/">Student</a>
        <a href="/admin">Admin</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
